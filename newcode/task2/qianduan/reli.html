<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Relilearn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
        }
        /* 顶部栏：校徽 + 标题 */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 40px;
            background-color: #ffffff;
        }
        .header img {
            height: 80px;
        }
        .header .title h1 {
            font-size: 36px;
            color: #2b579a;
            margin-bottom: 4px;
        }
        .header .title p {
            font-size: 14px;
            color: #333333;
        }
        /* 登录框容器 */
        .container {
            max-width: 400px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .back-link {
            color: #666666;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .desc {
            text-align: center;
            color: #666666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #2b579a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-outline {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
        }
        .forgot-link {
            text-align: right;
            font-size: 14px;
            color: #2b579a;
            cursor: pointer;
            margin: 8px 0 20px;
        }
        .success-icon {
            text-align: center;
            font-size: 48px;
            color: #2da44e;
            margin: 20px 0;
        }
    </style>
</head>

        <div class="title">
            <h1>Relilearn</h1>
            <p>嵌入式C程序教学辅助系统</p >
        </div>
    </div>

    <!-- 内容容器 -->
    <div class="container">
        <!-- 登录页 -->
        <div class="page active" id="login">
            <h2>系统登录</h2>
            <p class="desc">请输入您的用户名和密码以继续</p >
            <div class="input-group">
                <input type="text" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <input type="password" placeholder="请输入密码">
            </div>
            <div class="forgot-link" onclick="showPage('forgot')">忘记密码？</div>
            <button class="btn" onclick="login()">登录</button>
        </div>

        <!-- 忘记密码页 -->
        <div class="page" id="forgot">
            <div class="back-link" onclick="showPage('login')">← 返回登录</div>
            <h2>重置密码</h2>
            <p class="desc">请输入您注册时的邮箱，我们将发送重置链接</p >
            <div class="input-group">
                <input type="email" placeholder="请输入邮箱">
            </div>
            <button class="btn" onclick="showPage('success')">发送重置邮件</button>
        </div>

        <!-- 发送成功页 -->
        <div class="page" id="success">
            <div class="back-link" onclick="showPage('login')">← 返回登录</div>
            <h2>重置密码</h2>
            <div class="success-icon">✉️</div>
            <p style="text-align:center; font-size:18px; margin:10px 0;">邮件已发送！</p >
            <p class="desc">重置链接已发送至您的邮箱，请查收并按照邮件中的提示重置密码。</p >
            <button class="btn-outline" onclick="showPage('login')">返回登录</button>
        </div>
    </div>

    <script>
        // 切换页面
        function showPage(id) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
        }

        // 登录按钮点击事件
        function login() {
            alert("登录成功，即将跳转到主界面");
            // 后续可替换为：window.location.href = "main.html";
        }
    </script>
